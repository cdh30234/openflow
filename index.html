<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Hamad Mission Control v3</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --purple: #a855f7;
            --cyan: #06b6d4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        
        /* Layout */
        .container { max-width: 1600px; margin: 0 auto; }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        .brand h1 { margin: 0; font-size: 2rem; display: flex; align-items: center; gap: 10px; }
        .brand .live-indicator { font-size: 0.8rem; background: var(--danger); padding: 2px 8px; border-radius: 4px; animation: pulse 2s infinite; }
        .system-status { display: flex; gap: 20px; font-size: 0.9rem; }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot.idle { background: var(--text-muted); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Agents Grid */
        .agents-section { margin-bottom: 40px; }
        .section-title { font-size: 1.2rem; margin-bottom: 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .agent-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .agent-card::before {
            content: ''; position: absolute; top:0; left:0; width: 4px; height: 100%;
        }
        .agent-Hamad::before { background: var(--accent); }
        .agent-H2::before { background: var(--purple); }
        .agent-H3::before { background: var(--cyan); }
        
        .agent-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .agent-name { font-weight: bold; font-size: 1.1rem; }
        .agent-role { font-size: 0.8rem; color: var(--text-muted); }
        .agent-status { font-size: 0.8rem; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.1); text-transform: uppercase; }
        .agent-status.online { color: var(--success); border: 1px solid var(--success); background: rgba(34, 197, 94, 0.1); }
        .agent-status.idle { color: var(--text-muted); border: 1px solid var(--text-muted); }
        .agent-status.busy { color: var(--warning); border: 1px solid var(--warning); background: rgba(234, 179, 8, 0.1); }
        
        /* Task Board */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }
        .column {
            background: #162032;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 200px;
        }
        .col-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #334155;
            font-weight: bold;
        }
        .count-badge { background: #334155; px; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }

        /* Task Cards */
        .task-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid #334155;
            transition: transform 0.2s;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .task-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        
        .task-top { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; color: var(--text-muted); }
        .task-id { font-family: monospace; opacity: 0.7; }
        
        .task-title { font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        
        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #334155;
        }
        .assignee-badge { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
        .avatar { width: 20px; height: 20px; border-radius: 50%; background: #475569; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white;}
        
        /* Utility */
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .tag.high { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .tag.medium { background: rgba(234, 179, 8, 0.2); color: var(--warning); }
        .tag.low { background: rgba(59, 130, 246, 0.2); color: var(--accent); }

        .loading { text-align: center; color: var(--text-muted); padding: 20px; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>⚡ Hamad Mission Control <span class="live-indicator">LIVE</span></h1>
        </div>
        <div class="system-status">
            <div class="status-item"><span class="dot online"></span> Connected to Appwrite</div>
            <div class="status-item"><i class="fas fa-clock"></i> <span id="clock">--:--</span></div>
        </div>
    </header>

    <!-- AGENTS SECTION -->
    <div class="agents-section">
        <div class="section-title"><i class="fas fa-robot"></i> Active Units (الوكلاء)</div>
        <div class="agents-grid" id="agents-container">
            <div class="loading">Loading Agents...</div>
        </div>
    </div>

    <!-- TASK BOARD -->
    <div class="section-title"><i class="fas fa-layer-group"></i> Operations Board</div>
    <div class="board">
        
        <!-- BACKLOG / TODO -->
        <div class="column">
            <div class="col-header">
                <span>📋 الانتظار (To Do)</span>
                <span class="count-badge" id="count-todo">0</span>
            </div>
            <div id="col-todo"></div>
        </div>

        <!-- DOING -->
        <div class="column" style="border-top: 4px solid var(--warning)">
            <div class="col-header">
                <span>🚀 قيد التنفيذ (Active)</span>
                <span class="count-badge" id="count-doing">0</span>
            </div>
            <div id="col-doing"></div>
        </div>

        <!-- DONE -->
        <div class="column" style="border-top: 4px solid var(--success)">
            <div class="col-header">
                <span>✅ مكتمل (Done)</span>
                <span class="count-badge" id="count-done">0</span>
            </div>
            <div id="col-done"></div>
        </div>

    </div>
</div>

<script>
    // 1. Initialize Appwrite
    const { Client, Databases, Query } = Appwrite;
    const client = new Client();
    
    client
        .setEndpoint('https://fra.cloud.appwrite.io/v1')
        .setProject('69a172c60032723762dc');

    const databases = new Databases(client);
    const DB_ID = 'hamad_ops';
    const COLL_TASKS = 'tasks';
    const COLL_AGENTS = 'agents';

    // 2. Fetch & Render Functions
    async function updateDashboard() {
        try {
            const [tasksRes, agentsRes] = await Promise.all([
                databases.listDocuments(DB_ID, COLL_TASKS, [Query.limit(100)]),
                databases.listDocuments(DB_ID, COLL_AGENTS, [Query.limit(10)])
            ]);

            renderAgents(agentsRes.documents);
            renderTasks(tasksRes.documents);
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    function renderAgents(agents) {
        const container = document.getElementById('agents-container');
        container.innerHTML = agents.map(agent => `
            <div class="agent-card agent-${agent.name}">
                <div class="agent-header">
                    <span class="agent-name">${agent.name === 'Hamad' ? '⚡ Hamad' : (agent.name === 'H2' ? '🛠️ H2' : '💻 H3')}</span>
                    <span class="agent-status ${agent.status.toLowerCase()}">${agent.status}</span>
                </div>
                <div class="agent-role">${agent.role}</div>
                <div style="margin-top:10px; font-size:0.9rem">
                    <i class="fas fa-tasks"></i> Active: <strong>${agent.currentTask || 'None'}</strong>
                </div>
            </div>
        `).join('');
    }

    function renderTasks(tasks) {
        const todo = tasks.filter(t => t.status === 'todo');
        const doing = tasks.filter(t => t.status === 'doing');
        const done = tasks.filter(t => t.status === 'done');

        document.getElementById('count-todo').innerText = todo.length;
        document.getElementById('count-doing').innerText = doing.length;
        document.getElementById('count-done').innerText = done.length;

        document.getElementById('col-todo').innerHTML = todo.map(t => createTaskCard(t)).join('');
        document.getElementById('col-doing').innerHTML = doing.map(t => createTaskCard(t)).join('');
        document.getElementById('col-done').innerHTML = done.map(t => createTaskCard(t)).join('');
    }

    function createTaskCard(task) {
        const assigneeColor = task.assignee === 'Hamad' ? '#3b82f6' : '#64748b';
        const assigneeInitial = task.assignee.charAt(0);
        
        return `
            <div class="task-card" style="${task.status === 'done' ? 'opacity:0.6' : ''}">
                <div class="task-top">
                    <span class="task-id">#${task.taskId}</span>
                    <span class="tag ${task.priority.toLowerCase()}">${task.priority}</span>
                </div>
                <div class="task-title">${task.status === 'done' ? `<s>${task.title}</s>` : task.title}</div>
                <div class="task-footer">
                    <div class="assignee-badge">
                        <div class="avatar" style="background:${assigneeColor}">${assigneeInitial}</div>
                        ${task.assignee}
                    </div>
                </div>
            </div>
        `;
    }

    // 3. Start Loop
    updateDashboard(); // Initial load
    setInterval(updateDashboard, 5000); // Refresh every 5s

    // Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});
    }, 1000);

</script>

</body>
</html>
