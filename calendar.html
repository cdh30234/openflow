<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Hamad Calendar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #f59e0b; /* Amber */
            --border: #334155;
            
            --fc-page-bg-color: var(--bg);
            --fc-neutral-bg-color: var(--card-bg);
            --fc-list-event-hover-bg-color: #334155;
            --fc-border-color: var(--border);
            --fc-today-bg-color: rgba(245, 158, 11, 0.1);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        .header h1 { margin: 0; display: flex; align-items: center; gap: 10px; color: var(--accent); }
        .back-btn { background: #334155; border: none; padding: 8px 16px; border-radius: 6px; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .back-btn:hover { background: #475569; }

        #calendar {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* FullCalendar Overrides */
        .fc { color: var(--text); direction: ltr; } /* Keep calendar LTR for layout stability, map text manually */
        .fc-toolbar-title { font-size: 1.5rem !important; }
        .fc-button { background-color: #334155 !important; border: none !important; }
        .fc-button-active { background-color: var(--accent) !important; color: black !important; }
        .fc-col-header-cell-cushion { color: var(--text-muted); text-decoration: none; }
        .fc-daygrid-day-number { color: var(--text); text-decoration: none; }
        
        .fc-event { cursor: pointer; border: none; padding: 2px 5px; }
        .bg-cron { background-color: #ef4444 !important; }
        .bg-task { background-color: #3b82f6 !important; }
        .bg-meeting { background-color: #10b981 !important; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal {
            background: var(--card-bg);
            width: 90%; max-width: 500px;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; gap: 15px;
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.9rem; color: var(--text-muted); }
        input, select {
            background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px;
        }
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .btn { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--accent); color: black; }
        .btn-secondary { background: #334155; color: white; }

    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:20px">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> Operations Board</a>
        <h1><i class="fas fa-calendar-alt"></i> Hamad Calendar</h1>
    </div>
    <div style="display:flex; gap:15px; align-items:center">
        <button class="btn btn-primary" onclick="openModal()">Add Event</button>
    </div>
</div>

<div id="calendar"></div>

<!-- Add Event Modal -->
<div class="modal-overlay" id="eventModal">
    <div class="modal">
        <h2 style="margin:0">New Event</h2>
        
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="evtTitle" placeholder="Meeting / Task name">
        </div>
        
        <div class="form-group">
            <label>Type</label>
            <select id="evtType">
                <option value="task">Task</option>
                <option value="meeting">Meeting</option>
                <option value="cron">Cron Job</option>
            </select>
        </div>

        <div class="form-group">
            <label>Start Time</label>
            <input type="datetime-local" id="evtStart">
        </div>
        
        <div class="form-group">
            <label>End Time (Optional)</label>
            <input type="datetime-local" id="evtEnd">
        </div>

        <div class="form-group" id="cronField" style="display:none">
            <label>Cron Expression</label>
            <input type="text" id="evtCron" placeholder="0 0 * * *">
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEvent()">Save</button>
        </div>
    </div>
</div>

<script>
    const { Client, Databases, Query, ID } = Appwrite;
    const client = new Client();
    client.setEndpoint('https://fra.cloud.appwrite.io/v1').setProject('69a172c60032723762dc');
    const databases = new Databases(client);
    
    const DB_ID = 'hamad_ops';
    const COLL_CALENDAR = 'calendar_events';

    let calendar;

    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listWeek'
            },
            events: async function(info, successCallback, failureCallback) {
                try {
                    // Fetch from Appwrite
                    // In a real app we'd filter by date range, but fetching all for now (limit 100)
                    const response = await databases.listDocuments(DB_ID, COLL_CALENDAR, [Query.limit(100)]);
                    
                    const events = response.documents.map(doc => {
                        let className = 'bg-task';
                        if (doc.type === 'cron') className = 'bg-cron';
                        if (doc.type === 'meeting') className = 'bg-meeting';
                        
                        // For cron, we might need recurrence logic (RRule), 
                        // but for now let's just show the 'start' date event or handle it simply.
                        // FullCalendar RRule plugin is needed for true recurrence.
                        // We will just show the single instance for simplicity in V1.
                        
                        return {
                            id: doc.$id,
                            title: doc.title + (doc.type === 'cron' ? ' (Cron)' : ''),
                            start: doc.start,
                            end: doc.end || null,
                            className: className,
                            extendedProps: {
                                type: doc.type,
                                cron: doc.cronExpression
                            }
                        };
                    });
                    
                    successCallback(events);
                } catch (error) {
                    console.error("Error fetching events:", error);
                    failureCallback(error);
                }
            },
            eventClick: function(info) {
                alert('Event: ' + info.event.title + '\nType: ' + info.event.extendedProps.type);
            }
        });
        
        calendar.render();

        // Toggle Cron Field
        document.getElementById('evtType').addEventListener('change', (e) => {
            document.getElementById('cronField').style.display = e.target.value === 'cron' ? 'flex' : 'none';
        });
    });

    function openModal() {
        document.getElementById('eventModal').style.display = 'flex';
        // Set default start to now
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('evtStart').value = now.toISOString().slice(0,16);
    }

    function closeModal() {
        document.getElementById('eventModal').style.display = 'none';
    }

    async function saveEvent() {
        const title = document.getElementById('evtTitle').value;
        const type = document.getElementById('evtType').value;
        const start = new Date(document.getElementById('evtStart').value).toISOString();
        const endVal = document.getElementById('evtEnd').value;
        const end = endVal ? new Date(endVal).toISOString() : null;
        const cron = document.getElementById('evtCron').value;

        if (!title || !start) {
            alert('Title and Start Time are required');
            return;
        }

        try {
            await databases.createDocument(DB_ID, COLL_CALENDAR, ID.unique(), {
                title, type, start, end, cronExpression: cron, status: 'scheduled'
            });
            closeModal();
            calendar.refetchEvents();
        } catch (error) {
            alert('Error saving: ' + error.message);
        }
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('eventModal')) {
            closeModal();
        }
    }

</script>

</body>
</html>
